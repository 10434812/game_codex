version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: game_codex_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-game_codex_pass}
      MYSQL_DATABASE: ${DB_NAME:-game_codex}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
      - ./sql/002_seed_data.sql:/docker-entrypoint-initdb.d/002_seed_data.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
